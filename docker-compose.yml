services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-stack}_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-stack}_api
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      PORT: ${API_INTERNAL_PORT:-3000}
    networks:
      - app-network
    ports:
      - "${API_HOST_PORT:-3000}:${API_INTERNAL_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_API_UPSTREAM: ${NGINX_API_UPSTREAM:-api:3000}
    container_name: ${COMPOSE_PROJECT_NAME:-stack}_frontend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
    name: ${APP_NETWORK_NAME:-three-tier-app-net}
