name: GCP Project 4
on: [push]

jobs:

  create_infra:
    runs-on: ubuntu-latest
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: 'actions/checkout@v4'

    - uses: 'google-github-actions/auth@v3'
      with:
        service_account: 'project4-sa@project-55dcf55b-027c-4122-a45.iam.gserviceaccount.com'
        workload_identity_provider: 'projects/1073687322815/locations/global/workloadIdentityPools/github-project4/providers/github'
        token_format: 'access_token'

    - name: 'Setup Terraform'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.15.0"
        terraform_wrapper: false

    - name: 'apply terraform'
      run: |
        cd gcp && terraform init
        terraform apply -auto-approve
  
  build_and_push:
    needs: create_infra
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: 'actions/checkout@v4'

    - uses: 'google-github-actions/auth@v3'
      with:
        service_account: 'project4-sa@project-55dcf55b-027c-4122-a45.iam.gserviceaccount.com'
        workload_identity_provider: 'projects/1073687322815/locations/global/workloadIdentityPools/github-project4/providers/github'
        token_format: 'access_token'

    - name: 'Docker Auth'
      run: |-
        gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: 'Build images'
      run: |-
        docker build -t us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/frontend:${{ github.sha }} frontend/
        docker build -t us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/backend:${{ github.sha }} api/

    - name: Run Trivy vulnerability scanner on frontend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/frontend:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
    
    - name: Run Trivy vulnerability scanner on backend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/backend:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
    
    - name: 'Push images'
      run: |-
        docker push us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/frontend:${{ github.sha }}

        docker push us-central1-docker.pkg.dev/project-55dcf55b-027c-4122-a45/my-repository/backend:${{ github.sha }}
